services: 
  gateway: 
    build:
      context: .
      dockerfile: Dockerfile
    ports:
     - "8080:8080"
    stop_grace_period: 30s
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://0.0.0.0:8080
      ReverseProxy__Clusters__sample-backend__Destinations__sample-backend-primary__Address: http://sample-backend:8080/
      RateShield__Storage__Mode: Redis
      RateShield__Storage__FailureBehavior: FailClosed
      RateShield__Redis__ConnectionString: redis:6379
      RateShield__Redis__ConnectTimeoutMilliseconds: 5000
      RateShield__Redis__CommandTimeoutMilliseconds: 1000
    depends_on:
      - sample-backend
      - redis
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:8080/health/ready || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
  
  sample-backend:
    build:
      context: .
      dockerfile: src/RateShield.SampleBackend/Dockerfile
    stop_grace_period: 30s
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://0.0.0.0:8080
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:8080/health/ready || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  redis:
    image: redis:7-alpine
    ports:
     - "6379:6379"