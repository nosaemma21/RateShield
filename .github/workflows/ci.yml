name: CI


on:
   pull_request:
   push:
      branches:
         - main


jobs:
   build-test:
      name: Build and test
      runs-on: ubuntu-latest

      steps:
         - name: Checkout repository
           uses: actions/checkout@v4

         - name: Setup .NET 8
           uses: actions/setup-dotnet@v4
           with: 
            dotnet-version: 8.0.x

         - name: Restore dependencies
           run: dotnet restore RateShield.sln

         - name: Build solution
           run: dotnet build RateShield.sln --configuration Release --no-restore
         
         - name: Run tests
           run: dotnet test RateShield.sln --configuration Release --no-build

   docker-build:
      name: Build Docker image
      runs-on: ubuntu-latest
      needs: build-test

      steps:
         - name: Checkout repository
           uses: actions/checkout@v4

         - name: Buid gateway Docker image
           run: docker build -t rateshield-gateway:ci .