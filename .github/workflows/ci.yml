name: CI

permissions:
  contents: read
  packages: write


on:
   pull_request:
   push:
      branches:
         - main
      tags:
         - "v*.*.*"


jobs:
   build-test:
      name: Build and test
      runs-on: ubuntu-latest

      steps:
         - name: Checkout repository
           uses: actions/checkout@v4

         - name: Setup .NET 8
           uses: actions/setup-dotnet@v4
           with: 
            dotnet-version: 8.0.x

         - name: Restore dependencies
           run: dotnet restore RateShield.sln

         - name: Restore .NET tools
           run: dotnet tool restore

         - name: Check formatting
           run: dotnet format RateShield.sln --verify-no-changes --verbosity minimal

         - name: Audit package vulnerabilities
           run: dotnet list RateShield.sln package --vulnerable --include-transitive

         - name: Build solution
           run: dotnet build RateShield.sln --configuration Release --no-restore -warnaserror
         
         - name: Run tests with coverage
           run: dotnet dotnet-coverage collect "dotnet test RateShield.sln --configuration Release --no-build --results-directory TestResults" -f cobertura -o TestResults/coverage.cobertura.xml

         - name: Upload test results
           uses: actions/upload-artifact@v7
           if: always()
           with:
            name: test-results
            path: TestResults

         - name: Upload coverage report
           uses: "actions/upload-artifact@v7"
           if: always()
           with:
             name: coverage-report
             path: TestResults/coverage.cobertura.xml

   docker-build:
      name: Build Docker image
      runs-on: ubuntu-latest
      needs: 
         - build-test
         - validate-render-blueprint

      steps:
         - name: Checkout repository
           uses: actions/checkout@v4

         - name: Login to GHCR
           uses: docker/login-action@v3
           with: 
            registry: ghcr.io
            username: ${{github.actor}}
            password: ${{secrets.GITHUB_TOKEN}}

         - name: Set Docker image name
           run: echo "IMAGE_NAME=ghcr.io/${{github.repository_owner}}/rateshield-gateway" >> $GITHUB_ENV

         - name: Build Docker image
           run: |
                docker build -t $IMAGE_NAME:${{github.sha}} -t $IMAGE_NAME:latest .
                if [ "${{ github.ref_type }}" = "tag" ]; then
                  docker tag $IMAGE_NAME:${{github.sha}} $IMAGE_NAME:${{ github.ref_name }}
                fi

         - name: Scan Docker image for vulnerabilities
           uses: aquasecurity/trivy-action@v0.36.0
           with:
            image-ref: ${{ env.IMAGE_NAME }}:${{github.sha}}
            format: table
            exit-code: "1"
            ignore-unfixed: true
            vuln-type: os,library
            severity: CRITICAL,HIGH

         - name: Validate Docker image starts
           run: |
                docker run --rm -d --name rateshield-gateway-ci -p 8080:8080 \
                  -e ASPNETCORE_ENVIRONMENT=Production \
                  -e ASPNETCORE_URLS=http://0.0.0.0:8080 \
                  -e RateShield__Storage__Mode=InMemory \
                  $IMAGE_NAME:${{github.sha}}
          
                  sleep 10

                  curl --fail http://localhost:8080/health/live

                  docker stop rateshield-gateway-ci

         - name: push Docker image
           run: |
                docker push $IMAGE_NAME:${{github.sha}}
                docker push $IMAGE_NAME:latest
                if [ "${{ github.ref_type }}" = "tag" ]; then
                  docker push $IMAGE_NAME:${{ github.ref_name }}
                fi

   validate-render-blueprint:
      name: Validate Render blueprint
      runs-on: ubuntu-latest

      steps:
          - name: Checkout repository
            uses: actions/checkout@v4

          - name: Install Render CLI
            run: |
                curl -fsSL https://raw.githubusercontent.com/render-oss/cli/refs/heads/main/bin/install.sh | sh
                echo "$HOME/.render/bin" >> $GITHUB_PATH

          - name: Validate render.yaml
            run: render blueprints validate render.yaml
                