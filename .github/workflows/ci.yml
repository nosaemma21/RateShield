name: CI

permissions:
  contents: read
  packages: write


on:
   pull_request:
   push:
      branches:
         - main


jobs:
   build-test:
      name: Build and test
      runs-on: ubuntu-latest

      steps:
         - name: Checkout repository
           uses: actions/checkout@v4

         - name: Setup .NET 8
           uses: actions/setup-dotnet@v4
           with: 
            dotnet-version: 8.0.x

         - name: Restore dependencies
           run: dotnet restore RateShield.sln

         - name: Check formatting
           run: dotnet format RateShield.sln --verify-no-changes --verbosity minimal

         - name: Audit package vulnerabilities
           run: dotnet list RateShield.sln package --vulnerable --include-transitive

         - name: Build solution
           run: dotnet build RateShield.sln --configuration Release --no-restore
         
         - name: Run tests
           run: dotnet test RateShield.sln --configuration Release --no-build

   docker-build:
      name: Build Docker image
      runs-on: ubuntu-latest
      needs: build-test

      steps:
         - name: Checkout repository
           uses: actions/checkout@v4

         - name: Login to GHCR
           uses: docker/login-action@v3
           with: 
            registry: ghcr.io
            username: ${{github.actor}}
            password: ${{secrets.GITHUB_TOKEN}}

         - name: Set Docker image name
           run: echo "IMAGE_NAME=ghcr.io/${{github.repository_owner}}/rateshield-gateway" >> $GITHUB_ENV

         - name: Build Docker image
           run: docker build -t $IMAGE_NAME:${{github.sha}} -t $IMAGE_NAME:latest .

         - name: push Docker image
           run: docker push $IMAGE_NAME:${{github.sha}}
                docker push $IMAGE_NAME:latest