version: 2

updates:
  - package-ecosystem: nuget
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Africa/Lagos

    open-pull-requests-limit: 10

    groups:
      microsoft-packages:
        patterns:
          - "Microsoft.*"
        update-types:
          - minor
          - patch

      opentelemetry-packages:
        patterns:
          - "OpenTelemetry.*"
        update-types:
          - minor
          - patch

      testing-packages:
        patterns:
          - "xunit.*"
          - "Testcontainers.*"
        update-types:
          - minor
          - patch


    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major

    commit-message:
      prefix: "chore(deps)"