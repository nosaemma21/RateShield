services:
  - type: web
    name: rateshield-gateway-staging
    runtime: image
    image:
      url: ghcr.io/nosaemma21/rateshield-gateway:latest
    plan: free
    region: oregon
    autoDeploy: true
    healthCheckPath: /health/ready
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Staging
      - key: ASPNETCORE_URLS
        value: http://0.0.0.0:8080
      - key: Logging__LogLevel__Default
        value: Information
      - key: Logging__LogLevel__Microsoft.AspNetCore
        value: Warning
      - key: Logging__LogLevel__Yarp
        value: Information
      - key: Logging__Console__FormatterName
        value: json
      - key: RateShield__Storage__Mode
        value: Redis
      - key: RateShield__Storage__FailureBehavior
        value: FailClosed
      - key: RateShield__Redis__ConnectionString
        sync: false
      - key: RateShield__Redis__ConnectTimeoutMilliseconds
        value: "5000"
      - key: RateShield__Redis__CommandTimeoutMilliseconds
        value: "1000"
      - key: RateShield__Identity__TrustForwardedHeaders
        value: "true"
      - key: RateShield__Policies__Default__Capacity
        value: "100"
      - key: RateShield__Policies__Default__RefillTokens
        value: "10"
      - key: RateShield__Policies__Default__RefillPeriodSeconds
        value: "1"
      - key: RateShield__Policies__Default__RequestCost
        value: "1"
      - key: RateShield__Routes__sample-api__PolicyName
        value: Default
      - key: ReverseProxy__Clusters__sample-backend__Destinations__sample-backend-primary__Address
        sync: false

  - type: web
    name: rateshield-gateway-production
    runtime: image
    image:
      url: ghcr.io/nosaemma21/rateshield-gateway:latest
    plan: free
    region: oregon
    autoDeploy: false
    healthCheckPath: /health/ready
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://0.0.0.0:8080
      - key: Logging__LogLevel__Default
        value: Information
      - key: Logging__LogLevel__Microsoft.AspNetCore
        value: Warning
      - key: Logging__LogLevel__Yarp
        value: Information
      - key: Logging__Console__FormatterName
        value: json
      - key: RateShield__Storage__Mode
        value: Redis
      - key: RateShield__Storage__FailureBehavior
        value: FailClosed
      - key: RateShield__Redis__ConnectionString
        sync: false
      - key: RateShield__Redis__ConnectTimeoutMilliseconds
        value: "5000"
      - key: RateShield__Redis__CommandTimeoutMilliseconds
        value: "1000"
      - key: RateShield__Identity__TrustForwardedHeaders
        value: "true"
      - key: RateShield__Policies__Default__Capacity
        value: "100"
      - key: RateShield__Policies__Default__RefillTokens
        value: "10"
      - key: RateShield__Policies__Default__RefillPeriodSeconds
        value: "1"
      - key: RateShield__Policies__Default__RequestCost
        value: "1"
      - key: RateShield__Routes__sample-api__PolicyName
        value: Default
      - key: ReverseProxy__Clusters__sample-backend__Destinations__sample-backend-primary__Address
        sync: false
